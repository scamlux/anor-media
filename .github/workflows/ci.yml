name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22aa
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Build shared
        run: npm run build --workspace @anor/shared
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: Security Scan
        run: npm audit --audit-level=high
      - name: Build
        run: npm run build
