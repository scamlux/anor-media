services:
  postgres:
    image: postgres:16-alpine
    container_name: anor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: anor-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-orchestrator:
    build:
      context: .
      dockerfile: apps/ai-orchestrator/Dockerfile
    container_name: anor-ai-orchestrator
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AI_ORCHESTRATOR_API_KEY: ${AI_ORCHESTRATOR_API_KEY}
      PRIMARY_LLM_PROVIDER: ${PRIMARY_LLM_PROVIDER}
      FALLBACK_LLM_PROVIDER: ${FALLBACK_LLM_PROVIDER}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
    ports:
      - "8000:8000"

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: anor-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      AI_ORCHESTRATOR_URL: http://ai-orchestrator:8000
    command: sh -c "node apps/backend/dist/db/migrate.js && node apps/backend/dist/index.js"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-orchestrator:
        condition: service_started
    ports:
      - "4000:4000"

  backend-worker:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: anor-backend-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      AI_ORCHESTRATOR_URL: http://ai-orchestrator:8000
    command: node apps/backend/dist/queues/worker.js
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-orchestrator:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: anor-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: anor-nginx
    restart: unless-stopped
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - ai-orchestrator
    ports:
      - "80:80"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: anor-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - backend
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: anor-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    ports:
      - "3001:3000"

volumes:
  postgres_data:
  redis_data:
